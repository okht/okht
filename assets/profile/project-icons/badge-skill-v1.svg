<svg xmlns="http://www.w3.org/2000/svg" width="40" height="18" viewBox="0 0 40 18" role="img" aria-label="Skill">
  <title>Skill</title>
  <desc>Small rounded Skill badge with system UI font.</desc>
  <style>
    .bg { fill: #0969da; }
    .t { fill: #ffffff; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 600; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1f6feb; }
    }
  </style>
  <rect class="bg" width="40" height="18" rx="9" ry="9"/>
  <text class="t" x="20" y="13" text-anchor="middle">Skill</text>
</svg>
