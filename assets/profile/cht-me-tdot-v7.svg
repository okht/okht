    <clipPath id="mark-clip">
      <use xlink:href="#mark"/>
    </clipPath>
    <clipPath id="badge-clip">
      <circle cx="25" cy="26" r="15"/>
    </clipPath>
    <linearGradient id="body-light" gradientUnits="userSpaceOnUse" x1="432" y1="218" x2="535" y2="824">
      <stop offset="0" stop-color="#a9a9a9"/>
      <stop offset="0.12" stop-color="#d8d8d8"/>
      <stop offset="0.31" stop-color="#f7f7f7"/>
      <stop offset="0.58" stop-color="#ffffff"/>
      <stop offset="0.82" stop-color="#f4f4f4"/>
      <stop offset="1" stop-color="#c4c4c4"/>
    </linearGradient>
    <radialGradient id="center-bloom" gradientUnits="userSpaceOnUse" cx="500" cy="610" r="405" fx="500" fy="650">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.46" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.78" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge-tone" gradientUnits="userSpaceOnUse" x1="390" y1="225" x2="600" y2="820">
      <stop offset="0" stop-color="#5e5e5e" stop-opacity="0.78"/>
      <stop offset="0.18" stop-color="#9f9f9f" stop-opacity="0.46"/>
      <stop offset="0.43" stop-color="#eeeeee" stop-opacity="0.16"/>
      <stop offset="0.72" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#777777" stop-opacity="0.58"/>
