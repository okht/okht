<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Illuminated t dot logo</title>
  <desc id="desc">A monochrome lowercase italic t and period with soft white studio lighting on a pure black background.</desc>

  <defs>
    <g id="mark">
      <path d="M601.257 727.417C594.199 727.417 587.892 731.829 585.473 738.46L569.38 782.566C565.381 793.527 573.497 805.128 585.165 805.128H627.104C634.162 805.128 640.469 800.716 642.888 794.085L658.981 749.979C662.98 739.018 654.864 727.417 643.196 727.417H601.257Z"/>
      <path d="M532.778 237H488.79Q478.79 237 476.872 246.814L390.259 690.172C388.506 701.568 386.765 712.963 386.765 723.457C386.765 776.938 421.827 805 476.222 805H497.975Q505.975 805 507.479 797.142L515.879 753.254Q517.383 745.395 509.383 745.395H493.753C465.605 745.395 452.543 732.247 452.543 710.297C452.543 703.247 453.42 697.173 455.136 689.284L540.876 246.81Q542.778 237 532.778 237Z"/>
      <path d="M383.436 388.906C376.377 388.906 370.071 393.318 367.652 399.949L351.559 444.055C347.56 455.016 355.676 466.617 367.343 466.617H563.87C570.929 466.617 577.235 462.205 579.654 455.573L595.747 411.468C599.746 400.506 591.631 388.906 579.963 388.906H383.436Z"/>
    </g>

    <clipPath id="mark-clip">
      <use xlink:href="#mark"/>
    </clipPath>

    <linearGradient id="body-light" gradientUnits="userSpaceOnUse" x1="432" y1="218" x2="535" y2="824">
      <stop offset="0" stop-color="#a9a9a9"/>
      <stop offset="0.12" stop-color="#d8d8d8"/>
      <stop offset="0.31" stop-color="#f7f7f7"/>
      <stop offset="0.58" stop-color="#ffffff"/>
      <stop offset="0.82" stop-color="#f4f4f4"/>
      <stop offset="1" stop-color="#c4c4c4"/>
    </linearGradient>

    <radialGradient id="center-bloom" gradientUnits="userSpaceOnUse" cx="500" cy="610" r="405" fx="500" fy="650">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.46" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.78" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="edge-tone" gradientUnits="userSpaceOnUse" x1="390" y1="225" x2="600" y2="820">
      <stop offset="0" stop-color="#5e5e5e" stop-opacity="0.78"/>
      <stop offset="0.18" stop-color="#9f9f9f" stop-opacity="0.46"/>
      <stop offset="0.43" stop-color="#eeeeee" stop-opacity="0.16"/>
      <stop offset="0.72" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#777777" stop-opacity="0.58"/>
    </linearGradient>

    <linearGradient id="rim-light" gradientUnits="userSpaceOnUse" x1="360" y1="810" x2="620" y2="250">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft-drop" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset in="blur" dx="0" dy="3" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.9" result="shadow-color"/>
      <feComposite in="shadow-color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="blur-edge" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7"/>
    </filter>

    <filter id="blur-bloom" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#000000"/>

  <use xlink:href="#mark" fill="url(#body-light)" filter="url(#soft-drop)"/>

  <g clip-path="url(#mark-clip)">
    <ellipse cx="500" cy="615" rx="270" ry="380" fill="url(#center-bloom)" filter="url(#blur-bloom)"/>
    <use xlink:href="#mark" fill="none" stroke="#747474" stroke-width="18" stroke-linejoin="round" opacity="0.3" filter="url(#blur-edge)"/>
    <use xlink:href="#mark" fill="none" stroke="url(#edge-tone)" stroke-width="24" stroke-linejoin="round" opacity="0.82" filter="url(#blur-edge)"/>
    <use xlink:href="#mark" fill="none" stroke="url(#rim-light)" stroke-width="5" stroke-linejoin="round" opacity="0.62"/>
  </g>
</svg>
