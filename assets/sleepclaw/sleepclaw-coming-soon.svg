    <style>
      svg { overflow: visible; }
      .sc-owl-icon { animation: sc-owl-float 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .sc-owl-art { filter: drop-shadow(0 0 20px rgba(255,77,77,.4)); transform-box: fill-box; transform-origin: center; transform: scale(1); transition: transform .3s ease, filter .3s ease; }
      .sc-owl-icon:hover, svg:hover .sc-owl-icon { animation-play-state: paused; }
      .sc-owl-icon:hover .sc-owl-art, svg:hover .sc-owl-art { filter: drop-shadow(0 0 30px rgba(0,229,204,.6)); transform: scale(1.1); }
      .sc-ear-left, .sc-ear-right { animation-duration: 2s; animation-timing-function: ease-in-out; animation-iteration-count: infinite; transform-box: view-box; }
      .sc-ear-left { animation-name: sc-owl-ear-left; transform-origin: 405px 260px; }
      .sc-ear-right { animation-name: sc-owl-ear-right; transform-origin: 849px 260px; }
      #sc-left-wing, #sc-right-wing { animation-duration: 4s; animation-timing-function: ease-in-out; animation-iteration-count: infinite; transform-box: view-box; }
      #sc-left-wing { animation-name: sc-owl-wing-left; transform-origin: 337px 582px; }
      #sc-right-wing { animation-name: sc-owl-wing-right; transform-origin: 917px 582px; }
      .sc-pupil-glow { animation: sc-owl-blink 3s ease-in-out infinite; }
      @keyframes sc-owl-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3%); } }
      @keyframes sc-owl-ear-left { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
      @keyframes sc-owl-ear-right { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(3deg); } 75% { transform: rotate(-3deg); } }
      @keyframes sc-owl-wing-left { 0%, 74%, 86%, 96%, 100% { transform: rotate(0); } 80%, 91% { transform: rotate(30deg); } }
      @keyframes sc-owl-wing-right { 0%, 74%, 86%, 96%, 100% { transform: rotate(0); } 80%, 91% { transform: rotate(-30deg); } }
      @keyframes sc-owl-blink { 0%, 86%, 94%, 100% { opacity: 1; } 90% { opacity: .3; } }
      @media (prefers-reduced-motion: reduce) {
        .sc-owl-icon, .sc-ear-left, .sc-ear-right, #sc-left-wing, #sc-right-wing, .sc-pupil-glow { animation: none !important; }
        .sc-owl-art { transform: none; transition: none; }
        .sc-owl-icon:hover .sc-owl-art, svg:hover .sc-owl-art { transform: none; filter: drop-shadow(0 0 30px rgba(0,229,204,.6)); }
      }

      .sc-wordmark { fill: #17171A; }
      @media (prefers-color-scheme: dark) {
        .sc-wordmark { fill: #EDEDED; }
      }
    </style>
  </defs>
