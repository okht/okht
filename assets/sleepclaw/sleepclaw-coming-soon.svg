<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" role="img" aria-labelledby="sc-title sc-desc" preserveAspectRatio="xMidYMid meet">
  <title id="sc-title">SleepClaw — Coming soon.</title>
  <desc id="sc-desc">SleepClaw. Coming soon. An animated red owl floats, sways its ears, flaps both wings, and blinks.</desc>
