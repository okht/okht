      <path
      d="M255 494
      C225 491 201 519 184 560
      C169 600 165 649 169 699
      C173 767 193 841 230 884
      C241 897 253 899 264 891
      C298 864 327 817 344 767
      C366 702 359 638 337 582
      C318 534 283 495 255 494 Z"
      fill="url(#leftWingGradient)"
      vector-effect="non-scaling-stroke"/>
    </g>
    <g id="right-wing">
      <path d="M1000 494
      C1029 491 1053 519 1070 560
      C1084 600 1088 649 1084 699
      C1081 767 1061 841 1024 884
      C1013 897 1001 899 990 891
      C956 864 927 817 910 767
      C888 702 895 638 917 582
      C936 534 971 495 1000 494 Z"
      fill="#771416" fill-opacity="0.2"
      transform="translate(-8 7)"
      filter="url(#wingShadowBlur)" clip-path="url(#bodyClip)"/>
      <path
      d="M1000 494
      C1029 491 1053 519 1070 560
      C1084 600 1088 649 1084 699
      C1081 767 1061 841 1024 884
      C1013 897 1001 899 990 891
      C956 864 927 817 910 767
      C888 702 895 638 917 582
      C936 534 971 495 1000 494 Z"
      fill="url(#rightWingGradient)"
      vector-effect="non-scaling-stroke"/>
    </g>
  </g>

  <!-- Eyes -->
  <g id="eyes" filter="url(#eyeShadow)">
    <circle cx="489" cy="420" r="55" fill="url(#eyeGradient)"/>
    <circle cx="767" cy="420" r="55" fill="url(#eyeGradient)"/>
    <circle class="pupil-glow" cx="499" cy="411" r="19" fill="url(#pupilGradient)"/>
    <circle class="pupil-glow" cx="776" cy="411" r="19" fill="url(#pupilGradient)"/>
  </g>

  <!-- Beak -->
  <path id="beak"
        d="M595 491
           C588 491 584 494 583 499
           C582 503 584 509 587 515
           L617 572
           C620 578 624 580 628 579
           C632 579 635 575 638 570
           L669 511
           C672 505 672 500 669 496
           C666 492 662 491 655 491 Z"
        fill="url(#beakGradient)"/>

  <!-- Feet -->
  <g id="feet">
    <path id="left-foot"
          d="M505 1019
             C472 1019 443 1044 441 1076
             C440 1090 447 1100 458 1102
             C469 1103 479 1095 484 1084
             C489 1096 496 1101 506 1101
             C517 1101 525 1095 529 1084
             C535 1095 543 1101 553 1101
             C563 1101 569 1093 567 1081
             C565 1047 539 1019 505 1019 Z"
          fill="url(#leftFootGradient)"
          vector-effect="non-scaling-stroke"/>
    <path id="right-foot"
          d="M749 1019
             C716 1019 689 1046 687 1080
             C686 1092 692 1101 702 1102
             C712 1102 720 1096 725 1084
             C730 1096 738 1101 748 1101
             C759 1101 767 1095 772 1084
             C777 1095 786 1102 796 1102
             C807 1101 814 1092 812 1079
             C810 1046 783 1019 749 1019 Z"
          fill="url(#rightFootGradient)"
          vector-effect="non-scaling-stroke"/>
  </g>
    </g>
  </g>
</svg>
